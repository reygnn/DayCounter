<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" role="img" aria-label="Unbroken">
  <!-- Rounded-square background -->
  <rect width="108" height="108" rx="24" fill="#0D47A1"/>

  <!-- Soft top half-tone -->
  <rect x="0" y="0" width="108" height="54" rx="24" fill="#1565C0" fill-opacity="0.55"/>

  <!-- Ring track (translucent) -->
  <circle cx="54" cy="54" r="26" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="6"/>

  <!-- Progress arc: from 12 o'clock clockwise 270° to 9 o'clock -->
  <path d="M 54 28 A 26 26 0 1 1 28 54"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- Start marker (small dot at 12 o'clock) -->
  <circle cx="54" cy="28" r="4" fill="#FFFFFF"/>

  <!-- "Today" marker (larger dot at 9 o'clock) -->
  <circle cx="28" cy="54" r="6" fill="#FFFFFF"/>
</svg>
