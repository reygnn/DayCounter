<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" role="img" aria-label="DayCounter">
  <!-- Rounded-square background -->
  <rect width="108" height="108" rx="24" fill="#0D47A1"/>

  <!-- Soft top half-tone for a subtle highlight -->
  <rect x="0" y="0" width="108" height="54" rx="24" fill="#1565C0" fill-opacity="0.55"/>

  <!-- Ring track (full circle, translucent) -->
  <circle cx="54" cy="54" r="30" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="7"/>

  <!-- Progress arc: from 12 o'clock clockwise 270° to 9 o'clock -->
  <path d="M 54 24 A 30 30 0 1 1 24 54"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="7"
        stroke-linecap="round"/>

  <!-- Start marker (small filled dot at 12 o'clock) -->
  <circle cx="54" cy="24" r="4.5" fill="#FFFFFF"/>

  <!-- Current ("today") marker at 9 o'clock — emphasis ring -->
  <circle cx="24" cy="54" r="7" fill="#FFFFFF"/>
  <circle cx="24" cy="54" r="3" fill="#0D47A1"/>
</svg>
